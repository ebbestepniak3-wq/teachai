# infrastructure/nginx/nginx.conf – production Nginx config

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ─────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
    '"time":"$time_iso8601",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"status":$status,'
    '"body_bytes":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"remote_addr":"$remote_addr",'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"'
    '}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ─────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

  # ── Rate limiting ────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

  # ── Security ─────────────────────────────────────────────
  server_tokens off;
  client_max_body_size 55M;
  client_body_timeout 60s;
  client_header_timeout 30s;

  # ── Upstream ─────────────────────────────────────────────
  upstream nextjs {
    server web:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────
  server {
    listen 80;
    server_name teachai.de www.teachai.de;
    return 301 https://$host$request_uri;
  }

  # ── Main HTTPS server ────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name teachai.de www.teachai.de;

    ssl_certificate     /etc/ssl/certs/teachai.crt;
    ssl_certificate_key /etc/ssl/private/teachai.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https://api.anthropic.com https://api.stripe.com wss:; frame-src https://js.stripe.com; font-src 'self';" always;

    # Rate limiting
    limit_conn conn_limit_per_ip 20;

    # ── API routes ──────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=5 nodelay;
      limit_req_status 429;
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    location /api/upload {
      limit_req zone=upload burst=2 nodelay;
      client_max_body_size 55M;
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # SSE endpoint (no buffering)
    location /api/assistant/chat {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      add_header X-Accel-Buffering no;
    }

    # ── Static assets ───────────────────────────────────────
    location /_next/static/ {
      proxy_pass http://nextjs;
      proxy_cache_valid 200 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
      proxy_pass http://nextjs;
      add_header Cache-Control "public, max-age=86400";
    }

    # ── Default ─────────────────────────────────────────────
    location / {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
