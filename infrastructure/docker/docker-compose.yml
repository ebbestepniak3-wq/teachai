version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: teachai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teachai
      POSTGRES_USER: teachai
      POSTGRES_PASSWORD: teachai_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U teachai']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: teachai_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App (Production) ─────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    container_name: teachai_web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://teachai:teachai_dev_password@postgres:5432/teachai
      DIRECT_URL: postgresql://teachai:teachai_dev_password@postgres:5432/teachai
      NODE_ENV: production
    env_file:
      - ../../apps/web/.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - production

  # ── Adminer (DB GUI for dev) ─────────────────────────────────
  adminer:
    image: adminer
    container_name: teachai_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: teachai_network
