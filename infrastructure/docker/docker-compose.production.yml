version: '3.9'

# ── TeacherAI Production Stack ───────────────────────────────────────
# Includes: Next.js, PostgreSQL, Redis, Nginx, backup service

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: teachai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teachai}
      POSTGRES_USER: ${POSTGRES_USER:-teachai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup/init:/docker-entrypoint-initdb.d:ro
    ports:
      - '127.0.0.1:5432:5432'  # Only on localhost!
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-teachai}']
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=1000
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: teachai_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App ──────────────────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
      args:
        - BUILD_VERSION=${BUILD_VERSION:-latest}
    container_name: teachai_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-teachai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-teachai}
      DIRECT_URL: postgresql://${POSTGRES_USER:-teachai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-teachai}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    env_file:
      - ../../apps/web/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '127.0.0.1:3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '10'

  # ── Nginx ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: teachai_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl/teachai:/etc/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 60s
      timeout: 5s
      retries: 3

  # ── Backup service ───────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: teachai_backup
    restart: 'no'
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      S3_BUCKET: ${BACKUP_S3_BUCKET:-teachai-backups}
      AWS_ACCESS_KEY_ID: ${BACKUP_AWS_KEY}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_AWS_SECRET}
    volumes:
      - ./backup/scripts:/scripts:ro
      - backup_data:/backups
    entrypoint: /scripts/backup.sh
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - backup

  # ── Monitoring (Prometheus + Grafana in separate stack) ──────────
  # See infrastructure/monitoring/ for full monitoring stack

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  backup_data:
    driver: local

networks:
  default:
    name: teachai_production
    ipam:
      config:
        - subnet: 172.20.0.0/16
